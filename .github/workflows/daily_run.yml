name: MAD_FULL_MARKET_SCAN

on:
  schedule:
    # 1. 每日自動排程 (UTC 4-7 點)
    - cron: '0 4-7 * * *' 
    # 2. 台灣時間週五晚上分批執行 (轉為 UTC 時間)
    - cron: '0 12 * * 5' # 20:00 (0-500)
    - cron: '0 13 * * 5' # 21:00 (500-1000)
    - cron: '0 14 * * 5' # 22:00 (1000-1500)
    - cron: '0 15 * * 5' # 23:00 (1500-2000)

  workflow_dispatch:      # 🚀 這裡合併了手動功能與輸入參數
    inputs:
      manual_start:
        description: '手動輸入起始值 (START)'
        required: false
        default: ''
      manual_end:
        description: '手動輸入結束值 (END)'
        required: false
        default: ''

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. 設定分段參數
        id: set_slice
        run: |
          # 取得手動輸入值
          MANUAL_START="${{ github.event.inputs.manual_start }}"
          MANUAL_END="${{ github.event.inputs.manual_end }}"
          
          # 取得台北小時
          HOUR=$(TZ='Asia/Taipei' date +%H)

          if [ -n "$MANUAL_START" ] && [ -n "$MANUAL_END" ]; then
            # 優先權 1：如果有手動輸入，就用輸入的值
            START=$MANUAL_START
            END=$MANUAL_END
            SOURCE="手動輸入"
          else
            # 優先權 2：沒手動輸入，則依照時間自動判定
            SOURCE="自動時鐘 ($HOUR 點)"
            START=0
            END=500
            if [ "$HOUR" == "13" ]; then START=500; END=1000; fi
            if [ "$HOUR" == "14" ]; then START=1000; END=1500; fi
            if [ "$HOUR" == "15" ]; then START=1500; END=2100; fi
          fi
          
          echo "START=$START" >> $GITHUB_OUTPUT
          echo "END=$END" >> $GITHUB_OUTPUT
          echo "✅ 最終判定範圍：$START 到 $END (來源：$SOURCE)"
          
      - name: 3. 執行策略並發送通知
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 將判定好的分段傳入 Python
          SLICE_START: ${{ steps.set_slice.outputs.START }}
          SLICE_END: ${{ steps.set_slice.outputs.END }}
        run: |
          pip install FinMind pandas numpy tqdm requests
          python selector.py

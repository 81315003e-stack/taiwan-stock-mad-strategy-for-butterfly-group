name: MAD Daily Selector

on:
  schedule:
    - cron: '0 9 * * 1-5' 
  workflow_dispatch:      

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 開啟快取功能，加速安裝並減少失敗率

      - name: Force Install and Run
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          # 1. 確保 pip 是最新版
          python -m pip install --upgrade pip
          
          # 2. 強制安裝所有必要的套件 (包含那個一直失蹤的 tqdm)
          pip install FinMind pandas numpy tqdm requests
          
          # 3. 檢查一下到底裝進去沒 (這會在 Log 顯示清單)
          pip list
          
          # 4. 執行主程式
          python selector.py

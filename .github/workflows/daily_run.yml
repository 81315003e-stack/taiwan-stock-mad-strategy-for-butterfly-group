name: MAD Daily Selector

on:
  schedule:
    # 這是 cron 表示法，設定為台灣時間週一至週五下午 5:00 執行
    - cron: '0 9 * * 1-5' 
  workflow_dispatch:      # 讓你可以手動點擊按鈕立即執行

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Strategy
        env:
          # 這邊會去抓我們等一下要在 Settings 設定的密碼
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python selector.py

name: MAD_FULL_MARKET_SCAN

on:
  schedule:
    # 台灣時間週五晚上 20:00, 21:00, 22:00, 23:00 分批執行
    - cron: '0 12 * * 5' # 20:00 (0-500)
    - cron: '0 13 * * 5' # 21:00 (500-1000)
    - cron: '0 14 * * 5' # 22:00 (1000-1500)
    - cron: '0 15 * * 5' # 23:00 (1500-2000)
  workflow_dispatch:

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. 設定分段參數
        id: set_slice
        run: |
          HOUR=$(date +%H)
          
          # 預設值
          START=0
          END=500

          # 只要符合小時，不論手動還是自動都判定範圍
          if [ "$HOUR" == "12" ]; then START=0; END=500; fi
          if [ "$HOUR" == "13" ]; then START=500; END=1000; fi
          if [ "$HOUR" == "14" ]; then START=1000; END=1500; fi
          if [ "$HOUR" == "15" ]; then START=1500; END=2100; fi
          
          # 把寫入 $GITHUB_OUTPUT 放在最後，確保數值被傳出去
          echo "START=$START" >> $GITHUB_OUTPUT
          echo "END=$END" >> $GITHUB_OUTPUT
          echo "✅ 最終判定範圍：$START 到 $END"
          
      - name: 3. 執行策略並發送通知
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # 將判定好的分段傳入 Python
          SLICE_START: ${{ steps.set_slice.outputs.START }}
          SLICE_END: ${{ steps.set_slice.outputs.END }}
        run: |
          pip install FinMind pandas numpy tqdm requests
          python selector.py

name: MAD Daily Selector

on:
  schedule:
    # 台灣時間週一至週五下午 5:00 執行 (UTC 9:00)
    - cron: '0 9 * * 1-5' 
  workflow_dispatch:      # 讓你可以手動點擊按鈕執行

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. [VERSION 2.0] 強制安裝套件並執行策略
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          # 升級 pip
          python -m pip install --upgrade pip
          
          # 強制安裝所有依賴，解決 tqdm 缺失問題
          pip install FinMind pandas numpy tqdm requests
          
          # 顯示目前的套件清單 (診斷用)
          pip list
          
          # 正式執行你的選股腳本
          python selector.py

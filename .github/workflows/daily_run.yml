name: MAD Daily Selector

on:
  schedule:
    # 台灣時間每週五晚上 20:00 執行 (對應 UTC 12:00)
    - cron: '0 12 * * 5'
  workflow_dispatch:      

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. [重要] 診斷檔案內容
        run: |
          echo "--- 正在確認 requirements.txt 內容 ---"
          cat requirements.txt
          echo "--- 確認完畢 ---"

      - name: 3. 強制安裝套件並執行
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy tqdm requests
          python selector.py
      - name: 執行策略並發送 Telegram
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          pip install FinMind pandas numpy tqdm requests
          python selector.py

name: MAD Daily Selector

on:
  schedule:
    - cron: '0 9 * * 1-5' 
  workflow_dispatch:      

jobs:
  run_selector:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. [重要] 診斷檔案內容
        run: |
          echo "--- 正在確認 requirements.txt 內容 ---"
          cat requirements.txt
          echo "--- 確認完畢 ---"

      - name: 3. 強制安裝套件並執行
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          pip install FinMind pandas numpy tqdm requests
          python selector.py
